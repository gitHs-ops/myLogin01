<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <p class="subtitle">새로운 계정을 만드세요</p>

        <form action="/register" method="POST" onsubmit="return validateForm()">
            <div class="form-group">
                <label for="username">아이디</label>
                <div class="input-with-btn">
                    <input type="text" id="username" name="username" placeholder="아이디 입력" required>
                    <button type="button" class="btn btn-secondary" onclick="checkId()">중복확인</button>
                </div>
                <span id="id-msg" data-valid="false"></span>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호 입력" required>
            </div>
            <div class="form-group">
                <label for="password_confirm">비밀번호 재확인</label>
                <input type="password" id="password_confirm" name="password_confirm" placeholder="비밀번호 다시 입력" required>
            </div>
            <button type="submit" id="submit-btn" class="btn">가입하기</button>
        </form>

        <div class="footer-link">
            이미 계정이 있나요? <a href="/">로그인하기</a>
        </div>
    </div>
    <script src="static/js/script.js"></script>
</body>
</html>
